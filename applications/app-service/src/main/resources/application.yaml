server:
  port: 8081
spring:
  application:
    name: "ms-solicitud"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
adapters:
  r2dbc:
    host: "postgres-solicitud"
    port: 5432
    database: "solicitud_db"
    schema: "public"
    username: "solicitud_user"
    password: "solicitud_pass"
  data:
    r2dbc:
      repositories: null
      enabled: true
spring-doc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger
security:
  oauth2:
    resource-server:
      jwt:
        jwk-set-uri: http://ms-authentication:8080/.well-known/jwks.json
  jwt:
    issuer: crediya-auth
logging:
  level:
    org.springframework.security: DEBUG
    com.nimbusds.jose: DEBUG
    com.nimbusds.jose.jwk: DEBUG
    reactor.netty.http.client: DEBUG
user:
  service:
    url: "http://ms-authentication:8080"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapter:
  sqs:
    region: ${AWS_REGION}
    queueUrl: ${SQS_QUEUE_URL}
    credential:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

